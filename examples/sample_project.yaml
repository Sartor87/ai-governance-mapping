  AIGOV-005: { status: satisfied, evidence: "human review queue for flagged outputs" }
  AIGOV-006: { status: satisfied, evidence: "Llama Guard 3 pre-call moderation" }
  AIGOV-007: { status: satisfied, evidence: "output moderation + schema validation" }
  AIGOV-008: { status: satisfied, evidence: "model_card.md v3" }
  AIGOV-009: { status: satisfied, evidence: "OpenTelemetry audit log (schema v1)" }
  AIGOV-010: { status: satisfied, evidence: "per-tenant IAM + OPA policies" }
  AIGOV-011: { status: satisfied, evidence: "Ragas eval gate + Evidently drift" }
  AIGOV-012: { status: satisfied, evidence: "incident runbook + on-call" }
  AIGOV-013: { status: satisfied, evidence: "SBOM + model signature verification" }
  AIGOV-014: { status: satisfied, evidence: "PII detection + redaction in logs" }
